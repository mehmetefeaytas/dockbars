      - heading "Built for people who live in the Dock." [level=2] [ref=f3e84]
      - generic [ref=f3e85]:
        - article [ref=f3e86]:
          - generic [ref=f3e87]: 🫙
          - heading "Unlimited stashes" [level=3] [ref=f3e88]
          - paragraph [ref=f3e89]: Group apps and files into named stashes — Work, Dev, Games. Switch with ⌘1–9.
        - article [ref=f3e90]:
          - generic [ref=f3e91]: ⌨️
          - heading "Search & keyboard" [level=3] [ref=f3e92]
          - paragraph [ref=f3e93]: Start typing to fuzzy-search across every stash. Arrow keys and Return, no mouse needed.
        - article [ref=f3e94]:
          - generic [ref=f3e95]: 🧩
          - heading "More than apps" [level=3] [ref=f3e96]
          - paragraph [ref=f3e97]: Files, folders, websites, Shortcuts, shell scripts and text snippets — each opens the right way.
        - article [ref=f3e98]:
          - generic [ref=f3e99]: 🪟
          - heading "Liquid Glass" [level=3] [ref=f3e100]
          - paragraph [ref=f3e101]: A translucent panel that feels native on macOS 26, with System, Light and Dark themes.
        - article [ref=f3e102]:
          - generic [ref=f3e103]: 🖥️
          - heading "Multi-monitor" [level=3] [ref=f3e104]
          - paragraph [ref=f3e105]: The pocket opens on the screen your pointer is on, beside that display's Dock.
        - article [ref=f3e106]:
          - generic [ref=f3e107]: ⚡
          - heading "Featherweight" [level=3] [ref=f3e108]
          - paragraph [ref=f3e109]: A single cached rect-test on pointer move. Idle CPU near zero, memory in tens of MB.
        - article [ref=f3e110]:
          - generic [ref=f3e111]: 📋
          - heading "Widgets & clipboard" [level=3] [ref=f3e112]
          - paragraph [ref=f3e113]: Clock, battery and recent Downloads at a glance, plus an optional local clipboard history.
        - article [ref=f3e114]:
          - generic [ref=f3e115]: 🚀
          - heading "Automation" [level=3] [ref=f3e116]
          - paragraph [ref=f3e117]: Open a stash from anywhere with ⌥Space, the dockbars:// URL scheme, or the CLI.
        - article [ref=f3e118]:
          - generic [ref=f3e119]: 🔒
          - heading "Yours alone" [level=3] [ref=f3e120]
          - paragraph [ref=f3e121]: Everything stays on your Mac. No accounts, no network, no analytics — by design.
