      - heading "Built for people who live in the Dock." [level=2] [ref=f4e84]
      - generic [ref=f4e85]:
        - article [ref=f4e86]:
          - generic [ref=f4e87]: 🫙
          - heading "Unlimited stashes" [level=3] [ref=f4e88]
          - paragraph [ref=f4e89]: Group apps and files into named stashes — Work, Dev, Games. Switch with ⌘1–9.
        - article [ref=f4e90]:
          - generic [ref=f4e91]: ⌨️
          - heading "Search & keyboard" [level=3] [ref=f4e92]
          - paragraph [ref=f4e93]: Start typing to fuzzy-search across every stash. Arrow keys and Return, no mouse needed.
        - article [ref=f4e94]:
          - generic [ref=f4e95]: 🧩
          - heading "More than apps" [level=3] [ref=f4e96]
          - paragraph [ref=f4e97]: Files, folders, websites, Shortcuts, shell scripts and text snippets — each opens the right way.
        - article [ref=f4e98]:
          - generic [ref=f4e99]: 🪟
          - heading "Liquid Glass" [level=3] [ref=f4e100]
          - paragraph [ref=f4e101]: A translucent panel that feels native on macOS 26, with System, Light and Dark themes.
        - article [ref=f4e102]:
          - generic [ref=f4e103]: 🖥️
          - heading "Multi-monitor" [level=3] [ref=f4e104]
          - paragraph [ref=f4e105]: The pocket opens on the screen your pointer is on, beside that display's Dock.
        - article [ref=f4e106]:
          - generic [ref=f4e107]: ⚡
          - heading "Featherweight" [level=3] [ref=f4e108]
          - paragraph [ref=f4e109]: A single cached rect-test on pointer move. Idle CPU near zero, memory in tens of MB.
        - article [ref=f4e110]:
          - generic [ref=f4e111]: 📋
          - heading "Widgets & clipboard" [level=3] [ref=f4e112]
          - paragraph [ref=f4e113]: Clock, battery and recent Downloads at a glance, plus an optional local clipboard history.
        - article [ref=f4e114]:
          - generic [ref=f4e115]: 🚀
          - heading "Automation" [level=3] [ref=f4e116]
          - paragraph [ref=f4e117]: Open a stash from anywhere with ⌥Space, the dockbars:// URL scheme, or the CLI.
        - article [ref=f4e118]:
          - generic [ref=f4e119]: 🔒
          - heading "Yours alone" [level=3] [ref=f4e120]
          - paragraph [ref=f4e121]: Everything stays on your Mac. No accounts, no network, no analytics — by design.
